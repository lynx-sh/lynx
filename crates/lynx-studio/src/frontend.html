<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lynx Theme Studio</title>
<style>
  :root {
    --bg: #1a1b26;
    --bg2: #24283b;
    --bg3: #2f334d;
    --fg: #c0caf5;
    --fg2: #a9b1d6;
    --accent: #7aa2f7;
    --green: #9ece6a;
    --red: #f7768e;
    --yellow: #e0af68;
    --border: #3b3f5e;
    --radius: 6px;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  header .theme-name {
    font-size: 13px;
    color: var(--fg2);
    background: var(--bg3);
    padding: 3px 10px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
  }

  header .status {
    margin-left: auto;
    font-size: 12px;
    color: var(--fg2);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    vertical-align: middle;
  }

  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 280px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg2);
    margin-bottom: 10px;
  }

  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .color-row label {
    font-size: 13px;
    font-family: var(--font-mono);
    color: var(--fg);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .color-preview {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
  }

  .color-input {
    width: 75px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg);
    font-size: 12px;
    font-family: var(--font-mono);
    padding: 3px 6px;
    outline: none;
  }

  .color-input:focus {
    border-color: var(--accent);
  }

  .segment-list {
    list-style: none;
  }

  .segment-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    cursor: grab;
    border-radius: 4px;
    user-select: none;
  }

  .segment-item:active { cursor: grabbing; }

  .drag-handle {
    color: var(--fg2);
    font-size: 14px;
    opacity: 0.5;
  }

  .segment-badge {
    font-size: 12px;
    font-family: var(--font-mono);
    background: var(--bg3);
    color: var(--fg);
    padding: 3px 8px;
    border-radius: 4px;
    flex: 1;
  }

  .side-label {
    font-size: 10px;
    color: var(--fg2);
    background: var(--bg3);
    padding: 2px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 30px;
  }

  .preview-terminal {
    width: 100%;
    max-width: 700px;
    background: #0d0e17;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .terminal-titlebar {
    background: var(--bg3);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .term-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .terminal-body {
    padding: 20px;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.8;
    min-height: 160px;
  }

  .prompt-line {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 2px;
    margin-bottom: 4px;
  }

  .seg {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 13px;
    white-space: nowrap;
  }

  .prompt-cursor {
    display: inline-block;
    width: 9px;
    height: 18px;
    background: var(--accent);
    vertical-align: middle;
    border-radius: 1px;
    animation: blink 1.2s step-end infinite;
    margin-left: 4px;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .meta-info {
    font-size: 13px;
    color: var(--fg2);
    text-align: center;
    max-width: 500px;
  }

  .meta-info strong { color: var(--fg); }

  .actions {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }

  .btn-primary {
    background: var(--accent);
    color: #1a1b26;
  }

  .btn-secondary {
    background: var(--bg3);
    color: var(--fg);
    border: 1px solid var(--border);
  }

  .btn-danger {
    background: var(--red);
    color: #fff;
  }

  .saving { opacity: 0.5; pointer-events: none; }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show { opacity: 1; }

  .separator-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .separator-row label {
    font-size: 13px;
    color: var(--fg2);
    width: 70px;
  }

  .sep-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg);
    font-size: 14px;
    font-family: var(--font-mono);
    padding: 4px 8px;
    width: 60px;
    outline: none;
    text-align: center;
  }

  .sep-input:focus { border-color: var(--accent); }

  .dragging-over { background: var(--bg3); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>🦊 Lynx Theme Studio</h1>
  <span class="theme-name" id="theme-name">loading…</span>
  <span class="status"><span class="status-dot"></span>live</span>
</header>

<main>
  <div class="sidebar">
    <div class="section">
      <div class="section-title">Palette</div>
      <div id="palette-list"><!-- filled by JS --></div>
    </div>
    <div class="section">
      <div class="section-title">Separators</div>
      <div id="sep-list"><!-- filled by JS --></div>
    </div>
    <div class="section">
      <div class="section-title">Segments — Left</div>
      <ul class="segment-list" id="seg-left" data-side="left"><!-- filled by JS --></ul>
    </div>
    <div class="section">
      <div class="section-title">Segments — Right</div>
      <ul class="segment-list" id="seg-right" data-side="right"><!-- filled by JS --></ul>
    </div>
  </div>

  <div class="content">
    <div class="preview-area">
      <div class="preview-terminal">
        <div class="terminal-titlebar">
          <div class="term-btn" style="background:#ff5f57"></div>
          <div class="term-btn" style="background:#ffbd2e"></div>
          <div class="term-btn" style="background:#28ca41"></div>
        </div>
        <div class="terminal-body" id="prompt-preview">
          <div class="prompt-line" id="preview-line"><!-- rendered by JS --></div>
          <div style="color:#4a5568; margin-top:8px; font-size:12px">ls -la  →  exa --long</div>
        </div>
      </div>

      <div class="meta-info" id="meta-info">Loading theme…</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btn-apply">Apply Theme</button>
      <button class="btn btn-secondary" id="btn-reset">Reset to Saved</button>
      <span style="margin-left:auto; font-size:12px; color:var(--fg2)" id="save-status"></span>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let theme = {};
let pendingPatch = null;
let patchTimer = null;

async function loadTheme() {
  const res = await fetch('/theme');
  theme = await res.json();
  renderAll();
}

function renderAll() {
  document.getElementById('theme-name').textContent = theme.meta?.name ?? 'unknown';
  document.getElementById('meta-info').innerHTML =
    `<strong>${theme.meta?.name}</strong> — ${theme.meta?.description ?? ''} <br>` +
    `<span style="font-size:11px; color:var(--fg2)">by ${theme.meta?.author ?? 'unknown'}</span>`;
  renderPalette();
  renderSeparators();
  renderSegments();
  renderPromptPreview();
}

function renderPalette() {
  const list = document.getElementById('palette-list');
  list.innerHTML = '';
  const colors = theme.colors ?? {};
  for (const [key, val] of Object.entries(colors)) {
    const row = document.createElement('div');
    row.className = 'color-row';

    const label = document.createElement('label');
    label.textContent = key;

    const swatch = document.createElement('div');
    swatch.className = 'color-preview';
    swatch.style.background = resolveColor(val);

    const input = document.createElement('input');
    input.className = 'color-input';
    input.type = 'text';
    input.value = val;
    input.title = `colors.${key}`;

    input.addEventListener('input', () => {
      swatch.style.background = resolveColor(input.value);
    });
    input.addEventListener('change', () => {
      schedulePatch(`colors.${key}`, input.value);
    });
    swatch.addEventListener('click', () => {
      const picker = document.createElement('input');
      picker.type = 'color';
      picker.value = resolveColor(val).startsWith('#') ? resolveColor(input.value) : '#888888';
      picker.addEventListener('input', () => {
        input.value = picker.value;
        swatch.style.background = picker.value;
        schedulePatch(`colors.${key}`, picker.value);
      });
      picker.click();
    });

    row.appendChild(swatch);
    row.appendChild(label);
    row.appendChild(input);
    list.appendChild(row);
  }
}

function renderSeparators() {
  const list = document.getElementById('sep-list');
  list.innerHTML = '';
  const seps = theme.separators ?? {};
  const fields = [
    ['left', 'separators.left.char'],
    ['right', 'separators.right.char'],
    ['l-edge', 'separators.left_edge.char'],
    ['r-edge', 'separators.right_edge.char'],
  ];
  for (const [lbl, path] of fields) {
    const parts = path.split('.');
    const val = parts.reduce((o, k) => o?.[k], theme) ?? '';
    const row = document.createElement('div');
    row.className = 'separator-row';
    const label = document.createElement('label');
    label.textContent = lbl;
    const input = document.createElement('input');
    input.className = 'sep-input';
    input.type = 'text';
    input.value = val;
    input.addEventListener('change', () => schedulePatch(path, input.value));
    row.appendChild(label);
    row.appendChild(input);
    list.appendChild(row);
  }
}

function renderSegments() {
  for (const side of ['left', 'right']) {
    const ul = document.getElementById(`seg-${side}`);
    ul.innerHTML = '';
    const order = theme.segments?.[side]?.order ?? [];
    for (const seg of order) {
      ul.appendChild(makeSegItem(seg, side));
    }
    setupDragDrop(ul, side);
  }
}

function makeSegItem(name, side) {
  const li = document.createElement('li');
  li.className = 'segment-item';
  li.draggable = true;
  li.dataset.name = name;
  li.innerHTML = `
    <span class="drag-handle">⠿</span>
    <span class="segment-badge">${name}</span>
    <span class="side-label">${side}</span>
    <button class="btn btn-danger" style="padding:2px 8px; font-size:11px" title="Remove">×</button>
  `;
  li.querySelector('button').addEventListener('click', () => {
    patchSegment('remove', name, side);
  });
  return li;
}

function setupDragDrop(ul, side) {
  let dragged = null;
  ul.addEventListener('dragstart', e => {
    dragged = e.target.closest('li');
    dragged.style.opacity = '0.4';
  });
  ul.addEventListener('dragend', e => {
    dragged.style.opacity = '';
    dragged = null;
    commitSegmentOrder(ul, side);
  });
  ul.addEventListener('dragover', e => {
    e.preventDefault();
    const over = e.target.closest('li');
    if (over && over !== dragged) {
      const rect = over.getBoundingClientRect();
      const after = e.clientY > rect.top + rect.height / 2;
      ul.insertBefore(dragged, after ? over.nextSibling : over);
    }
  });
}

function commitSegmentOrder(ul, side) {
  const names = [...ul.querySelectorAll('li')].map(li => li.dataset.name);
  if (!theme.segments) theme.segments = {};
  if (!theme.segments[side]) theme.segments[side] = {};
  theme.segments[side].order = names;
  renderPromptPreview();
  // Push full order as a patch for each position
  names.forEach((name, i) => {
    // We can't send a full array directly via patch, so we trigger a backend rebuild.
    // For ordering we POST a special segment/move call.
  });
  // Patch the full order string as JSON array
  const arrayStr = JSON.stringify(names).replace(/"/g, '');
  // We'll do it via the segment-order endpoint
  fetch('/theme/segment-order', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ side, order: names })
  }).then(() => showToast('Segment order updated'));
}

async function patchSegment(op, name, side) {
  const res = await fetch('/theme/segment', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ op, name, side })
  });
  if (res.ok) {
    const updated = await res.json();
    theme = updated;
    renderAll();
    showToast(`${op} ${name}`);
  }
}

function schedulePatch(path, value) {
  clearTimeout(patchTimer);
  patchTimer = setTimeout(() => applyPatch(path, value), 400);
}

async function applyPatch(path, value) {
  const saveStatus = document.getElementById('save-status');
  saveStatus.textContent = 'saving…';
  const res = await fetch('/theme/patch', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ path, value })
  });
  if (res.ok) {
    const updated = await res.json();
    theme = updated;
    renderPromptPreview();
    saveStatus.textContent = 'saved';
    setTimeout(() => { saveStatus.textContent = ''; }, 2000);
  } else {
    const err = await res.text();
    showToast('Error: ' + err, true);
    saveStatus.textContent = 'error';
  }
}

function renderPromptPreview() {
  const line = document.getElementById('preview-line');
  line.innerHTML = '';
  const palette = theme.colors ?? {};
  const leftOrder = theme.segments?.left?.order ?? [];
  const seps = theme.separators ?? {};
  const leftSep = seps.left?.char ?? ' ';

  const segData = {
    dir: { text: '~/projects/lynx', icon: '' },
    git_branch: { text: ' main', icon: '' },
    git_status: { text: '✓', icon: '' },
    git_stash: { text: '⚑1', icon: '' },
    cmd_duration: { text: '1.2s', icon: '⏱' },
    username: { text: 'proxy', icon: '' },
    hostname: { text: 'mac', icon: '' },
    exit_code: { text: '0', icon: '' },
    venv: { text: 'venv', icon: '' },
    node_version: { text: '20.11', icon: '' },
    rust_version: { text: '🦀 stable', icon: '' },
    golang_version: { text: '🐹 1.22', icon: '' },
    ruby_version: { text: '💎 3.3', icon: '' },
  };

  leftOrder.forEach((name, i) => {
    const info = segData[name] ?? { text: name, icon: '' };
    const segCfg = theme.segment?.[name] ?? {};
    const fg = resolveColor(segCfg?.color?.fg ?? '#c0caf5', palette);
    const bg = resolveColor(segCfg?.color?.bg ?? '', palette);
    const span = document.createElement('span');
    span.className = 'seg';
    span.textContent = `${info.icon}${info.text}`;
    span.style.color = fg || 'var(--fg)';
    if (bg) span.style.background = bg;
    line.appendChild(span);
    if (i < leftOrder.length - 1 && leftSep) {
      const s = document.createElement('span');
      s.style.color = resolveColor(seps.left?.color ?? '#4a5568', palette) || '#4a5568';
      s.style.fontSize = '16px';
      s.textContent = leftSep;
      line.appendChild(s);
    }
  });

  // Caret
  const pChar = theme.segment?.prompt_char ?? {};
  const caretColor = resolveColor(pChar?.color?.fg ?? '', palette) || 'var(--accent)';
  const caretSym = pChar?.symbol ?? '❯';
  const caret = document.createElement('span');
  caret.style.color = caretColor;
  caret.style.marginLeft = '4px';
  caret.style.fontWeight = 'bold';
  caret.textContent = caretSym;
  line.appendChild(caret);

  const cursor = document.createElement('span');
  cursor.className = 'prompt-cursor';
  line.appendChild(cursor);
}

function resolveColor(val, palette) {
  if (!val) return '';
  palette = palette ?? theme.colors ?? {};
  if (val.startsWith('$')) {
    const key = val.slice(1);
    return palette[key] ?? val;
  }
  return val;
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? 'var(--red)' : 'var(--border)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('btn-apply').addEventListener('click', async () => {
  const btn = document.getElementById('btn-apply');
  btn.textContent = 'Applying…';
  btn.classList.add('saving');
  const res = await fetch('/theme/apply', { method: 'POST' });
  if (res.ok) {
    showToast('Theme applied! Server closing…');
    btn.textContent = '✓ Applied';
    setTimeout(() => window.close(), 1500);
  } else {
    showToast('Apply failed', true);
    btn.textContent = 'Apply Theme';
    btn.classList.remove('saving');
  }
});

document.getElementById('btn-reset').addEventListener('click', async () => {
  await fetch('/theme/reset', { method: 'POST' });
  loadTheme();
  showToast('Reset to saved theme');
});

// SSE for live updates from server
const es = new EventSource('/events');
es.onmessage = e => {
  try {
    theme = JSON.parse(e.data);
    renderAll();
  } catch (_) {}
};

loadTheme();
</script>
</body>
</html>
