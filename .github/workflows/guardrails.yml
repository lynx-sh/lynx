name: Guardrails

on:
  push:
    branches: ["main", "fix/**", "feat/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  guardrails:
    name: Invariant & wiring guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Install bats-core and zsh
        run: |
          sudo apt-get update -q
          sudo apt-get install -y bats zsh

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Build lx binary
        run: cargo build -p lynx-cli --bin lx

      - name: Add lx to PATH
        run: echo "${{ github.workspace }}/target/debug" >> "$GITHUB_PATH"

      - name: Run guardrail verifier
        run: bash scripts/verify-guardrails.sh

  clippy:
    name: Clippy (deny warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
