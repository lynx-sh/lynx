[meta]
name = "tokyo-night"
description = "Tokyo Night powerline theme with background-colored segments"
author = "proxikal"

[separators]
mode = "adaptive"

[separators.left]
char = "\ue0b4"

[separators.left_edge]
char = "\ue0b6"

[separators.right]
char = "\ue0b6"

[segments]
spacing = true

[segments.top]
order = ["dir", "git_branch", "git_status"]

[segments.top_right]
order = ["cmd_duration", "git_sha", "time"]

[segments.left]
order = ["prompt_char"]

[segments.right]
order = []

[segment.username]
color = { fg = "#c0caf5", bg = "#1a1b26" }

[segment.dir]
icon = " "
max_depth = 3
truncate_to_repo = true
color = { fg = "#c0caf5", bg = "#3d59a1", bold = true }

[segment.git_branch]
icon = " "
color = { fg = "#1a1b26", bg = "#9ece6a", bold = true }

[segment.git_status]
staged    = { icon = "+", color = "green" }
modified  = { icon = "!", color = "red" }
untracked = { icon = "?", color = "grey" }
color = { fg = "#1a1b26", bg = "#9ece6a" }

[segment.git_sha]
length = 7
color = { fg = "#565f89" }

[segment.cmd_duration]
min_ms = 500
color = { fg = "#e0af68" }

[segment.time]
format = "24h"
color = { fg = "#565f89" }

[segment.prompt_char]
symbol = "❯"
error_symbol = "❯"
color = { fg = "#9ece6a" }

[segment.context_badge]
show_in = ["agent"]
label = { agent = "AI", minimal = "MIN" }
color = { fg = "#bb9af7", bold = true }

[syntax_highlight]
command   = "#9ece6a"
unknown   = "#f7768e"
builtin   = "#bb9af7"
alias     = "#7aa2f7"
function  = "#7dcfff"
path      = "#c0caf5"
string    = "#e0af68"
argument  = "#c0caf5"
option    = "#7aa2f7"
comment   = "#565f89"
globbing  = "#ff9e64"
variable  = "#bb9af7"

[autosuggestions]
color = "#565f89"

[colors]
accent  = "#7aa2f7"
success = "#9ece6a"
warning = "#e0af68"
error   = "#f7768e"
muted   = "#565f89"

[ls_colors]
dir            = { fg = "#7aa2f7", bold = true }
symlink        = { fg = "#7dcfff" }
executable     = { fg = "#9ece6a", bold = true }
archive        = { fg = "#f7768e" }
image          = { fg = "#bb9af7" }
audio          = { fg = "#7dcfff" }
broken         = { fg = "#f7768e", bold = true }
other_writable = { fg = "#7aa2f7", bg = "#9ece6a" }

[ls_colors.columns]
date         = "#565f89"   # muted blue-grey — timestamps recede
size_number  = "#e0af68"   # warning orange — sizes stand out
size_unit    = "#565f89"   # muted — unit is secondary to the number
user_you     = "#9ece6a"   # green — your own files are friendly
user_other   = "#f7768e"   # red — other owners draw attention
group_you    = "#7aa2f7"   # blue — groups you belong to
group_other  = "#565f89"   # muted — groups you're not in
perm_read    = "#9ece6a"   # green — readable
perm_write   = "#e0af68"   # yellow — writable
perm_exec    = "#f7768e"   # red — executable
header       = "#7aa2f7"   # blue — column headers match accent
symlink_path = "#7dcfff"   # light cyan — matches symlink file color
