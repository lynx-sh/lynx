[meta]
name = "tokyo-night"
description = "Tokyo Night powerline theme — gradient segments, single line"
author = "proxikal"

[separators]
mode = "adaptive"

[separators.left]
char = "\ue0b4"

[separators.left_edge]
char = "░▒▓"
color = "#a3aed2"

[segments]
spacing = false

[segments.top]
order = ["custom_apple", "dir", "git_branch", "git_status", "lang_version", "time"]

[segments.left]
order = ["prompt_char"]

[segments.right]
order = []

[segment.custom_apple]
template = " 󰀵 "
color = { fg = "#090c0c", bg = "#a3aed2" }

[segment.dir]
icon = "  "
max_depth = 3
truncate_to_repo = true
color = { fg = "#090c0c", bg = "#769ff0", bold = true }

[segment.git_branch]
icon = "  "
color = { fg = "#769ff0", bg = "#394260" }

[segment.git_status]
staged    = { icon = "+", color = "green" }
modified  = { icon = "!", color = "red" }
untracked = { icon = "?", color = "grey" }
color = { fg = "#769ff0", bg = "#394260" }

[segment.lang_version]
color = { fg = "#769ff0", bg = "#212736" }

[segment.time]
format = "24h"
icon = "  "
color = { fg = "#a0a9cb", bg = "#1d2230" }

[segment.prompt_char]
symbol = "›"
error_symbol = "›"
color = { fg = "#769ff0" }
error_color = { fg = "#f7768e" }

[segment.context_badge]
show_in = ["agent"]
label = { agent = "AI", minimal = "MIN" }
color = { fg = "#bb9af7", bold = true }

[segment.git_sha]
length = 7
color = { fg = "#565f89" }

[segment.cmd_duration]
min_ms = 500
color = { fg = "#e0af68" }

[syntax_highlight]
command   = "#9ece6a"
unknown   = "#f7768e"
builtin   = "#bb9af7"
alias     = "#7aa2f7"
function  = "#7dcfff"
path      = "#c0caf5"
string    = "#e0af68"
argument  = "#c0caf5"
option    = "#7aa2f7"
comment   = "#565f89"
globbing  = "#ff9e64"
variable  = "#bb9af7"

[autosuggestions]
color = "#565f89"

[colors]
accent  = "#7aa2f7"
success = "#9ece6a"
warning = "#e0af68"
error   = "#f7768e"
muted   = "#565f89"

[ls_colors]
dir            = { fg = "#7aa2f7", bold = true }
symlink        = { fg = "#7dcfff" }
executable     = { fg = "#9ece6a", bold = true }
archive        = { fg = "#f7768e" }
image          = { fg = "#bb9af7" }
audio          = { fg = "#7dcfff" }
broken         = { fg = "#f7768e", bold = true }
other_writable = { fg = "#7aa2f7", bg = "#9ece6a" }

[ls_colors.extensions]
# Rust / systems
rs   = { fg = "#e7894f" }
toml = { fg = "#9ece6a" }
lock = { fg = "#565f89" }
# Shell / scripts
sh   = { fg = "#e0af68", bold = true }
zsh  = { fg = "#e0af68" }
bash = { fg = "#e0af68" }
fish = { fg = "#e0af68" }
# Web / JS / TS
