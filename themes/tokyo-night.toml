ts   = { fg = "#7aa2f7" }
tsx  = { fg = "#7aa2f7" }
jsx  = { fg = "#e0af68" }
json = { fg = "#9ece6a" }
css  = { fg = "#7dcfff" }
html = { fg = "#ff9e64" }
vue  = { fg = "#9ece6a" }
svelte = { fg = "#ff9e64" }
# Python
py   = { fg = "#bb9af7" }
