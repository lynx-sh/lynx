md   = { fg = "#c0caf5" }
txt  = { fg = "#a9b1d6" }
log  = { fg = "#565f89" }
env  = { fg = "#e0af68" }
ini  = { fg = "#9ece6a" }
conf = { fg = "#9ece6a" }
cfg  = { fg = "#9ece6a" }
# Data
sql  = { fg = "#ff9e64" }
