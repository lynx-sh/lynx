[meta]
name        = "rkj-repo"
description = "Port of the rkj-repo OMZ theme — two-line prompt with full path, timestamp, git status"
author      = "proxikal"

# ── Layout ─────────────────────────────────────────────────────────────────────
#
# Line 1 (top):   ┌─[user@host] - [~/full/path] - [YYYY-MM-DD HH:MM:SS]    [branch+✱]
# Line 2 (input): └─[✗]
#
# Git section only appears inside a git repo.
# Bottom [✗] is always shown.

[segments.top]
order = [
  "custom_top_open",
  "username",
  "custom_at",
  "hostname",
  "custom_mid1",
  "dir",
  "custom_mid2",
  "time",
  "custom_top_close",
]

[segments.top_right]
order = [
  "custom_git_open",
  "git_branch",
  "git_status",
  "custom_git_close",
]

[segments.left]
order = [
  "custom_bot_prefix",
  "custom_bot_open",
  "custom_bot_x",
  "custom_bot_close",
]

[segments.right]
order = []

# ── Separators ─────────────────────────────────────────────────────────────────
# No gap between segments — each segment owns its own spacing/glyphs.
[separators]
left.char  = ""
right.char = ""

# ── Top-line segments ──────────────────────────────────────────────────────────

[segment.custom_top_open]
template = "┌─["
color    = { fg = "blue", bold = true }

[segment.username]
color = { fg = "green", bold = true }

[segment.custom_at]
template = "@"
color    = { fg = "grey" }

[segment.hostname]
show_when_ssh = false   # always show, not only over SSH
color         = { fg = "cyan" }

[segment.custom_mid1]
template = "] - ["
color    = { fg = "blue", bold = true }

[segment.dir]
max_depth        = 50
truncate_to_repo = false
color            = { bold = true }   # bold terminal-default — matches %{$fg_bold[default]%}

[segment.custom_mid2]
template = "] - ["
color    = { fg = "blue", bold = true }

[segment.time]
format = "%Y-%m-%d %I:%M:%S"   # date + 12-hour time, matches %D{"%Y-%m-%d %I:%M:%S"}
color  = { fg = "yellow" }

[segment.custom_top_close]
template = "]"
color    = { fg = "blue", bold = true }

# ── Bottom / input-line segments ───────────────────────────────────────────────

[segment.custom_bot_prefix]
template = "└─"
color    = { fg = "blue", bold = true }

[segment.custom_bot_open]
template = "["
color    = { fg = "blue", bold = true }

[segment.custom_bot_x]
template = "✗"
color    = { fg = "yellow", bold = true }

[segment.custom_bot_close]
template = "]"
color    = { fg = "blue", bold = true }

# Git section — rendered in top_right slot, only appears when inside a git repo.
[segment.custom_git_open]
template = "["
color    = { fg = "blue", bold = true }

[segment.git_branch]
icon   = ""
format = "$branch"
color  = { fg = "yellow", bold = true }

[segment.git_status]
staged    = { icon = "+" }
modified  = { icon = "✱" }
untracked = { icon = "✈" }
color     = { fg = "yellow" }

[segment.custom_git_close]
template = "]"
color    = { fg = "blue", bold = true }

# ── ls_colors ─────────────────────────────────────────────────────────────────
[syntax_highlight]
command   = "#50fa7b"   # known commands — green (matches executable color)
unknown   = "#ff5555"   # unknown/invalid commands — red
builtin   = "#8be9fd"   # builtins — cyan (matches hostname color)
alias     = "#ffb86c"   # aliases — orange
function  = "#bd93f9"   # functions — purple
path      = "#f8f8f2"   # existing paths — foreground
string    = "#f1fa8c"   # quoted strings — yellow (matches time segment)
argument  = "#f8f8f2"   # plain args — foreground
option    = "#8be9fd"   # --flags — cyan
comment   = "#6272a4"   # comments — muted
globbing  = "#ffb86c"   # * ** ? globs — orange
variable  = "#ffb86c"   # VAR= assignments — yellow/orange (matches prompt)

[autosuggestions]
color = "#6272a4"

[ls_colors]
dir            = { fg = "cyan",    bold = true }
symlink        = { fg = "cyan"                 }
executable     = { fg = "green",   bold = true }
archive        = { fg = "red"                  }
image          = { fg = "magenta"              }
audio          = { fg = "cyan"                 }
broken         = { fg = "red",     bold = true }
other_writable = { fg = "blue",    bg = "dark-green" }

[ls_colors.columns]
date         = "#6272a4"   # muted — timestamps recede
size_number  = "#ffb86c"   # orange/yellow — matches time segment color
size_unit    = "#6272a4"   # muted — unit is secondary
user_you     = "#50fa7b"   # green — matches executable color
user_other   = "#ff5555"   # red — other owners draw attention
group_you    = "#8be9fd"   # cyan — matches hostname segment color
group_other  = "#6272a4"   # muted — groups you're not in
perm_read    = "#50fa7b"   # green — readable
perm_write   = "#ffb86c"   # orange — writable
perm_exec    = "#ff5555"   # red — executable
header       = "#7aa2f7"   # blue — column headers match prompt brackets
symlink_path = "#8be9fd"   # cyan — matches symlink file color
