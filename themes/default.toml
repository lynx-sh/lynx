[meta]
name = "default"
description = "Clean, minimal default theme"
author = "proxikal"

[segments.left]
order = ["dir", "git_branch", "git_status", "prompt_char"]

[segments.right]
order = ["cmd_duration", "task_status", "context_badge"]

[segment.dir]
max_depth = 3
truncate_to_repo = true
color = { fg = "blue", bold = true }

[segment.git_branch]
icon = " "
color = { fg = "yellow" }

[segment.git_status]
staged   = { icon = "+", color = "green" }
modified = { icon = "!", color = "red" }
untracked = { icon = "?", color = "grey" }

[segment.cmd_duration]
min_ms = 500
color = { fg = "grey" }

[segment.task_status]
color = { fg = "yellow" }

[segment.context_badge]
show_in = ["agent"]
label = { agent = "AI", minimal = "MIN" }
color = { fg = "magenta", bold = true }

[segment.prompt_char]
symbol = "❯"
error_symbol = "❯"
color = { fg = "green" }

[colors]
accent  = "#7aa2f7"
success = "#9ece6a"
warning = "#e0af68"
error   = "#f7768e"
muted   = "#565f89"

[syntax_highlight]
command   = "#50fa7b"   # known commands — green
unknown   = "#ff5555"   # unknown/invalid commands — red
builtin   = "#8be9fd"   # builtins (cd, echo, export) — cyan
alias     = "#ffb86c"   # aliases — orange
function  = "#bd93f9"   # functions — purple
path      = "#f8f8f2"   # existing paths — foreground
string    = "#f1fa8c"   # quoted strings — yellow
argument  = "#f8f8f2"   # plain args — foreground
option    = "#8be9fd"   # --flags and -x — cyan
comment   = "#6272a4"   # comments — muted blue-grey
globbing  = "#ffb86c"   # * ** ? globs — orange
variable  = "#bd93f9"   # VAR= assignments — purple

[autosuggestions]
color = "#6272a4"

[ls_colors]
dir           = { fg = "blue",    bold = true  }
symlink       = { fg = "cyan"                  }
executable    = { fg = "green",   bold = true  }
archive       = { fg = "red"                   }
image         = { fg = "magenta"               }
audio         = { fg = "cyan"                  }
broken        = { fg = "red",     bold = true  }
other_writable = { fg = "blue",   bg = "dark-green" }

[ls_colors.columns]
date         = "#6272a4"   # muted — timestamps recede
size_number  = "#ffb86c"   # orange — sizes stand out
size_unit    = "#6272a4"   # muted — unit is secondary
user_you     = "#50fa7b"   # green — your files
user_other   = "#ff5555"   # red — other owners
group_you    = "#8be9fd"   # cyan — groups you're in
group_other  = "#6272a4"   # muted — groups you're not in
perm_read    = "#50fa7b"   # green — readable
perm_write   = "#f1fa8c"   # yellow — writable
perm_exec    = "#ff5555"   # red — executable
header       = "#8be9fd"   # cyan — column headers
symlink_path = "#8be9fd"   # cyan — symlink targets
