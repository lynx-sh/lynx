[[plugin]]
name = "eza"
description = "Modern ls replacement with icons, git integration, and tree view"
author = "lynx-sh"
package_type = "tool"
category = "file-management"
replaces = "ls"
theme_integrated = true
latest_version = "0.0.0"
[plugin.install]
brew = "eza"
apt = "eza"
cargo = "eza"
[[plugin.versions]]
version = "0.0.0"
url = "pm"
checksum_sha256 = "pm"

