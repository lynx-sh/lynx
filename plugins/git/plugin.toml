[plugin]
name        = "git"
version     = "0.2.0"
description = "Git integration — branch, status, stash, ahead/behind cache, daily workflow aliases"
authors     = ["proxikal"]

[load]
lazy  = false
hooks = ["chpwd", "precmd"]

[deps]
binaries = ["git"]
plugins  = []

[exports]
functions = [
  "git_branch",
  "git_dirty",
  "git_stash_count",
  "git_ahead_behind",
  "git_root",
  "git_refresh_state",
]
aliases = ["gst", "gco", "gcm", "glog", "gd", "ga", "gp", "gl", "gsh", "grb", "gsw"]

[contexts]
disabled_in = ["agent", "minimal"]
